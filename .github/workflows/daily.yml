name: Daily Sector Collection

on:
  schedule:
    - cron: '0 22 * * *'  # 한국시간 오전 7시 (오전판)
    - cron: '0 11 * * *'  # 한국시간 오후 8시 (오후판)
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests yfinance

      - name: 섹터 데이터 수집 및 텔레그램 발행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python collector.py

      - name: 결과 파일 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sector_data.json
          git commit -m "Update sector data $(date +'%Y-%m-%d %H:%M')" || echo "변경사항 없음, 커밋 스킵"
          git pull --rebase origin main || echo "pull 충돌 없음 또는 불필요"
          git push
